services:
  verdaccio:
    image: verdaccio/verdaccio:6
    container_name: itamaraty-ds-shacdn-verdaccio
    ports:
      - "4873:4873"
    volumes:
      - ./conf:/verdaccio/conf
      - verdaccio-storage:/verdaccio/storage
    environment:
      - VERDACCIO_PORT=4873

volumes:
  verdaccio-storage:
    driver: local
